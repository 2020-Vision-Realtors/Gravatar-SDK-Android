# yaml-language-server: $schema=https://raw.githubusercontent.com/buildkite/pipeline-schema/main/schema.json
---

# Variables used in this pipeline are defined in `shared-pipeline-vars`, which is `source`'d before calling `buidkite-agent pipeline upload`

agents:
  queue: "android"

steps:
  - label: "Gradle Wrapper Validation"
    command: |
      validate_gradle_wrapper
    plugins: [$CI_TOOLKIT]
    notify:
      - github_commit_status:
          context: "Gradle Wrapper Validation"

  # Wait for Gradle Wrapper to be validated before running any other jobs
  - wait

  - label: "Static code analysis"
    command: |
      echo "--- 🧹 Linting"
      ./gradlew ktlintcheck detekt
    notify:
      - github_commit_status:
          context: "Static code analysis"

  - label: "☢️ Danger - PR Check"
    command: danger
    key: danger
    if: "build.pull_request.id != null"
    retry:
      manual:
        permit_on_passed: true
    notify:
      - github_commit_status:
          context: "Danger - PR Check"
    agents:
      queue: "linter"

  - label: "Build"
    command: |
      echo "--- ⚒️ Building"
      # `build` task would also run tasks, which are executed in a separate job
      ./gradlew assemble
    notify:
      - github_commit_status:
          context: "Build"

  - label: "Unit tests"
    command: |
      echo "--- 🧪 Testing"
      ./gradlew test
    artifact_paths:
      - "**/build/test-results/*/*.xml"
    notify:
      - github_commit_status:
          context: "Unit tests"

  - label: "Lint"
    command: ".buildkite/commands/lint.sh"
    plugins: [$CI_TOOLKIT]
    artifact_paths:
      - "**/build/reports/lint-results*.*"
    notify:
      - github_commit_status:
          context: "Lint"

  - label: "Screenshot tests"
    command: |
      echo "--- 🧪📸 Screenshot Testing"
      ./gradlew \
      :gravatar-ui:verifyRoborazziDebug -Pscreenshot \
      :gravatar-quickeditor:verifyRoborazziDebug -Pscreenshot
    artifact_paths:
      - "**/build/test-results/*/*.xml"
    notify:
      - github_commit_status:
          context: "Screenshot tests"

  - label: "Binary compatibility check"
    command: |
      echo "--- Validating binary compatibility"
      ./gradlew apiCheck
    notify:
      - github_commit_status:
          context: "Binary compatibility check"

  - wait: ~
    if: build.branch == "trunk" || build.tag != null

  - label: "Publish SDK to S3"
    command: .buildkite/commands/publish-to-s3.sh
    plugins: [$CI_TOOLKIT]
    notify:
      - github_commit_status:
          context: "Publish :gravatar"

  # Run it after building step so the generated files are not bundled with the release
  - label: "OpenAPI generation"
    command: |
      echo "--- ⚒️ Generating OpenAPI code"
      ./gradlew :gravatar:openApiGenerate
    notify:
      - github_commit_status:
          context: "OpenAPI generation"

  - label: "Prototype Builds"
    if: "build.pull_request.id != null"
    command: .buildkite/commands/prototype-build.sh
    plugins: [ $CI_TOOLKIT ]
    artifact_paths:
      - "**/build/outputs/apk/**/*"
    notify:
      - github_commit_status:
          context: "Prototype Builds"

  - label: "Dependency Tree Diff"
    command: |
      comment_with_dependency_diff 'gravatar-quickeditor' 'releaseRuntimeClasspath'
    if: build.pull_request.id != null
    plugins: [ $CI_TOOLKIT ]
    notify:
      - github_commit_status:
          context: "Dependency Tree Diff"
